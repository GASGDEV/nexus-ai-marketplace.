<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato | Nexus AI Marketplace</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <div class="logo">
            <h1>Nexus<span>AI</span></h1>
        </div>
        <nav aria-label="Menu Principal">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="produtos.html">Produtos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="contato">
            <h2>Fale com a Equipe</h2>
            <p>Solicite modelos de IA ou tire suas dúvidas.</p>

            <form action="#" method="POST">
                <div>
                    <label for="nome">Nome Completo:</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div>
                    <label for="email">E-mail Profissional:</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div>
                    <label for="assunto">Assunto da Solicitação:</label>
                    <select id="assunto" name="assunto" required>
                        <option value="">Selecione um assunto...</option>
                        <option value="prompt">Compra de Prompts</option>
                        <option value="modelos">Modelos de Machine Learning</option>
                        <option value="suporte">Suporte Técnico</option>
                    </select>
                </div>

                <div>
                    <label for="mensagem">Detalhes do Pedido:</label>
                    <textarea id="mensagem" name="mensagem" rows="5" required></textarea>
                </div>

                <button type="submit">Enviar Mensagem</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 Nexus AI Marketplace. Todos os direitos reservados.</p>
    </footer>
</body>
</html>
